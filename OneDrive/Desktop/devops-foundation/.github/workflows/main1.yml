name: MeetMux CI/CD

on:
  push:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Debug - Show files
        run: ls -la

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install
        working-directory: .   # ✅ force root

      - name: Run Unit Tests
        run: npm test
        working-directory: .   # ✅ force root

      - name: Build Status
        run: echo "Pipeline Successful"